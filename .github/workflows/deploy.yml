on: push
name: Deploy
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Clean
      uses: zh-liang-cn/zh-liang-cn.github.io@master
      with:
        args: clean
    - name: Generate
      uses: zh-liang-cn/zh-liang-cn.github.io@master
      with:
        args: generate
    - name: Deploy
      uses: zh-liang-cn/zh-liang-cn.github.io@master
      env:
        EMAIL: zh.liang.cn@gmail.com
        NAME: zh.liang.cn
      with:
        args: deploy
